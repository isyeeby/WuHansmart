# 途家一体化部署：静态前端 + 反代 FastAPI
# 用法：
#   1. 前端：cd TuJiaFeature && npm run build
#   2. 后端：在 127.0.0.1:8000 启动（如 uvicorn main:app --host 127.0.0.1 --port 8000）
#   3. 把下面 root 改成你服务器上 dist 的实际路径，再 include 到 sites-enabled 或 copy 到 conf.d/

upstream tujia_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    # listen 443 ssl http2;
    # ssl_certificate     /path/to/fullchain.pem;
    # ssl_certificate_key /path/to/privkey.pem;
    server_name _;  # 改成你的域名，如 app.example.com

    # 构建产物目录（按服务器实际路径修改）
    root /var/www/tujia-feature/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    client_max_body_size 20m;

    # 前端 SPA：History 路由回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源长期缓存（Vite 带 hash 的文件名）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API → FastAPI（注意 proxy_pass 末尾不要加 /，否则会去掉 /api 前缀）
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
        proxy_pass http://tujia_api;
    }

    # 可选：对外暴露 API 文档（不需要可删除或加 IP 限制）
    location /docs {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://tujia_api;
    }
    location /redoc {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://tujia_api;
    }
    location /openapi.json {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_pass http://tujia_api;
    }
}
